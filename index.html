<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Promociones tienda</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      overflow: hidden;
    }

    .promo {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: #fff;
      opacity: 1;
      transition: opacity 0.8s ease;
    }

    .oculta {
      opacity: 0;
    }
  </style>
</head>
<body>

  <img id="promo" class="promo" src="" alt="Promoción">

  <script>
    const promociones = [
        "promos/promo1.png",
        "promos/promo2.jpg",
        "promos/promo3.jpg",
        "promos/promo4.jpg",
        "promos/promo5.jpg"
    ];

    let indice = 0;
    const img = document.getElementById("promo");
    const tiempoPorPromo = 8000; // 8 segundos

    function mostrarPromo() {
      img.classList.add("oculta");

      setTimeout(() => {
        img.src = promociones[indice];
        img.classList.remove("oculta");

        indice = (indice + 1) % promociones.length;
      }, 800);
    }

    mostrarPromo();
    setInterval(mostrarPromo, tiempoPorPromo);
  </script>

</body>
</html>
